[workspace]
version = 1
root = "." # default
config-dir = "config" # default
generated-dir = ".cyberfabric" # default

[env.app1.dev]
config = "app1-dev.yml" # relative from config_dir
modules = [
    {
        name = "module1",
        source = "local", # local | remote | registry
        version = "1.2.0", # required for remote and registry
        package = "crate1",
    },
    {
        name = "module2",
        source = "remote",
        version = "0.1.0",
        package = "crate2",
    }
]
run = {
    watch = { enabled = true }, # this is the default
    fips = false,
    otel = true
}
build = {
    name = "app1", # override env name
    profile = "debug"
}

[env.app1.lint]
dylint = {
    enabled = true,
    skip = ["rule-name"],
}
clippy = true # by default
fmt = true # by default
feature-set-test = true # inherits the feature set to test


[env.app1.test.default]
runner = "nextest"
config = "app1-test.yml"
coverage = true
feature-set = {
    "module1" = [
        ["unit", "integration"],
        ["sqlite"],
        ["postgres"],
        ["fips"],
        false # disable all features
    ],
    "module2" = true, # enable all features
}

[env.app1.prod]
config = "app1-prod.yml"
modules = [
    {
        name = "module1",
        source = "local", # local | remote | registry
        version = "1.2.0", # required for remote and registry
        package = "crate1",
    },
    {
        name = "module2",
        source = "remote",
        version = "0.1.0",
        package = "crate2",
    }
]
run = {
    watch = { enabled = false },
    fips = true,
    otel = true
}
build = {
    name = "app1", # override env name
    profile = "release"
}